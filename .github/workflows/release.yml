name: Release & Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # Only run on merged PRs (not direct pushes)
    if: github.event.head_commit.message != ''
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      # RELEASE_TOKEN (PAT) is required to push version commits and tags
      # to main, which is protected and requires PRs for normal pushes.
      # The PAT owner must be added to bypass_pull_request_allowances.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14
          cache: 'pnpm'
          # Do NOT set registry-url here — it creates .npmrc with
          # _authToken=${NODE_AUTH_TOKEN} placeholder that blocks
          # npm 11's native OIDC trusted publishing flow.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print Environment Info
        run: pnpm exec nx report

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version, Changelog & Tag
        run: pnpm exec nx release --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: '0'

      # npm CLI handles OIDC trusted publishing natively with --provenance.
      # Node 22 ships npm 10.x which lacks OIDC support; npm 11.5.1+ is required.
      - name: Publish to npm
        run: |
          # Install npm with native OIDC trusted publishing support
          npm install -g npm@latest
          echo "npm version: $(npm --version)"

          # Defensive: remove any _authToken lines from .npmrc files
          # that would cause npm to skip OIDC and fail with ENEEDAUTH
          for npmrc in "$HOME/.npmrc" ".npmrc" "${NPM_CONFIG_USERCONFIG:-}"; do
            if [ -n "$npmrc" ] && [ -f "$npmrc" ]; then
              echo "Cleaning _authToken from $npmrc"
              sed -i '/_authToken/d' "$npmrc"
            fi
          done

          # Verify OIDC prerequisites
          echo "ACTIONS_ID_TOKEN_REQUEST_URL is set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          npm config list

          published=0
          skipped=0
          failed=0

          for dir in dist/packages/*/; do
            if [ -f "$dir/package.json" ]; then
              pkg_name=$(node -p "require('./$dir/package.json').name")
              pkg_version=$(node -p "require('./$dir/package.json').version")
              echo "::group::Publishing $pkg_name@$pkg_version"

              if npm publish "$dir" --provenance --access public; then
                echo "✓ Published $pkg_name@$pkg_version"
                published=$((published + 1))
              else
                exit_code=$?
                # Exit code 0 or already-published (409/403) are acceptable
                if npm view "$pkg_name@$pkg_version" version 2>/dev/null; then
                  echo "⊘ Skipped $pkg_name@$pkg_version (already published)"
                  skipped=$((skipped + 1))
                else
                  echo "✗ Failed to publish $pkg_name@$pkg_version"
                  failed=$((failed + 1))
                fi
              fi
              echo "::endgroup::"
            fi
          done

          echo ""
          echo "Summary: $published published, $skipped skipped, $failed failed"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi
