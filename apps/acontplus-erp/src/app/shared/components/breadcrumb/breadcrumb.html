<nav aria-label="breadcrumb">
  <ol class="acontplus-breadcrumb">
    @for (item of navItems; track $index; let isFirst = $first) {
      <li class="acontplus-breadcrumb-item">
        @if (isFirst) {
          <a href="#" class="link">{{ item }}</a>
        }
        @if (!isFirst) {
          <mat-icon class="chevron">chevron_right</mat-icon>
          <span>{{ item }}</span>
        }
      </li>
    }
  </ol>
</nav>
