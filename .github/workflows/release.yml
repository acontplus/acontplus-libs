name: Release & Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # Only run on merged PRs (not direct pushes)
    if: github.event.head_commit.message != ''
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      # RELEASE_TOKEN (PAT) is required to push version commits and tags
      # to main, which is protected and requires PRs for normal pushes.
      # The PAT owner must be added to bypass_pull_request_allowances.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print Environment Info
        run: pnpm exec nx report

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version, Changelog & Tag
        run: pnpm exec nx release --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: '0'

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          published=0
          skipped=0
          failed=0

          for dir in dist/packages/*/; do
            if [ -f "$dir/package.json" ]; then
              pkg_name=$(node -p "require('./$dir/package.json').name")
              pkg_version=$(node -p "require('./$dir/package.json').version")
              echo "::group::Publishing $pkg_name@$pkg_version"

              if npm publish "$dir" --provenance --access public; then
                echo "✓ Published $pkg_name@$pkg_version"
                published=$((published + 1))
              else
                exit_code=$?
                if npm view "$pkg_name@$pkg_version" version 2>/dev/null; then
                  echo "⊘ Skipped $pkg_name@$pkg_version (already published)"
                  skipped=$((skipped + 1))
                else
                  echo "✗ Failed to publish $pkg_name@$pkg_version"
                  failed=$((failed + 1))
                fi
              fi
              echo "::endgroup::"
            fi
          done

          echo ""
          echo "Summary: $published published, $skipped skipped, $failed failed"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi
