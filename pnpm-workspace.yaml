packages:
  - 'apps/*'
  - 'packages/*'

# pnpm v11+ uses allowBuilds (explicit allowlist) instead of the removed
# ignoredBuiltDependencies / onlyBuiltDependencies settings.
# Only packages listed here are permitted to run install scripts.
allowBuilds:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - less
  - lmdb
  - msgpackr-extract
  - nx
  - rollup
  - unrs-resolver

overrides:
  qs: '>=6.14.1'
