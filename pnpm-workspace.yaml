packages:
  - 'apps/*'
  - 'packages/*'

# pnpm v9+ reads overrides and ignoredBuiltDependencies from pnpm-workspace.yaml,
# not from the "pnpm" field in package.json.
overrides:
  qs: '>=6.14.1'

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - less
  - lmdb
  - msgpackr-extract
  - nx
  - rollup
  - unrs-resolver
