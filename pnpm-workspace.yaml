packages:
  - 'apps/*'
  - 'packages/*'

# pnpm v11: allowBuilds is a map of package name -> boolean (explicit allowlist).
# Replaces the removed ignoredBuiltDependencies / onlyBuiltDependencies settings.
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  rollup: true
  unrs-resolver: true

overrides:
  qs: '>=6.14.1'
