name: Release & Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # Only run on merged PRs (not direct pushes)
    if: github.event.head_commit.message != ''
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      # RELEASE_TOKEN (PAT) is required to push version commits and tags
      # to main, which is protected and requires PRs for normal pushes.
      # The PAT owner must be added to bypass_pull_request_allowances.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print Environment Info
        run: pnpm exec nx report

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version, Changelog & Tag
        run: pnpm exec nx release --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: '0'

      # Exchange GitHub OIDC token for a short-lived npm publish token.
      # pnpm doesn't support OIDC natively (only npm CLI 11.5.1+ does),
      # so we do the exchange manually and set NODE_AUTH_TOKEN.
      - name: Authenticate with npm via OIDC
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" | jq -r '.value')
          NPM_TOKEN=$(curl -sS -X POST "https://registry.npmjs.org/-/npm/v1/security/oidc/token" \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"${OIDC_TOKEN}\"}" | jq -r '.token')
          echo "NODE_AUTH_TOKEN=${NPM_TOKEN}" >> $GITHUB_ENV

      - name: Publish to npm
        run: pnpm exec nx release publish
