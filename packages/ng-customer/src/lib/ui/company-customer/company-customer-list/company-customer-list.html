<acp-data-grid
  [showToolbar]="true"
  [toolbarTemplate]="headerToolbar"
  [data]="dataSource()"
  [columns]="columnsDefs"
  [cellTemplate]="{
    op: templateOp,
  }"
  [length]="pageCount()"
  [pageIndex]="pageIndex()"
  [pageSize]="pageSize()"
  (page)="handlePageEvent($event)"
/>
<ng-template #headerToolbar>
  <div class="d-flex flex-row gap-2 align-items-center">
    <mat-form-field>
      <mat-label>Buscar</mat-label>
      <input matInput [(ngModel)]="dataSearch.textSearch" />
      <ng-container matSuffix>
        <acp-button variant="secondary" icon="refresh" matStyle="icon" (handleClick)="refresh()" />
      </ng-container>
    </mat-form-field>

    <div class="ms-auto d-flex flex-row gap-2">
      @if (canGenerateReport()) {
      <acp-button
        variant="info"
        icon="download"
        matStyle="filled"
        text="Exportar Reporte"
        [matMenuTriggerFor]="exportMenu"
      />
      }
      <mat-menu #exportMenu="matMenu">
        <button mat-menu-item (click)="exportExcel()">
          <mat-icon>table_view</mat-icon>
          <span>Exportar a Excel</span>
        </button>
        <button mat-menu-item (click)="exportPdf()">
          <mat-icon>picture_as_pdf</mat-icon>
          <span>Exportar a PDF</span>
        </button>
      </mat-menu>

      @if (canAdd()) {
      <acp-button
        acpCompanyCustomerAddEdit
        (companyCustomerSaved)="refresh()"
        variant="success"
        icon="add"
        matStyle="filled"
        text="Nuevo"
      />
      }

      <acp-button variant="secondary" icon="refresh" matStyle="icon" (handleClick)="refresh()" />
    </div>
  </div>
</ng-template>

<ng-template #templateOp let-data>
  @if (canEdit()){
  <acp-button
    acpCompanyCustomerAddEdit
    (companyCustomerSaved)="refresh()"
    [id]="data.idCliente"
    variant="success"
    icon="edit"
    matStyle="icon"
  />
  } @if (!data.esConsumidorFinal) {
  <acp-button (handleClick)="askToDelete(data)" variant="danger" icon="delete" matStyle="icon" />
  }
</ng-template>
