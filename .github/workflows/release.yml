name: Release & Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # Required to push version commits, tags, and create GitHub releases
  contents: write
  # Required for OIDC trusted publishing — allows GitHub Actions to generate
  # short-lived tokens that npm exchanges for publish credentials
  id-token: write

jobs:
  release:
    # Only run on merged PRs (not direct pushes)
    if: github.event.head_commit.message != ''
    runs-on: ubuntu-latest
    # Must match the Environment name configured in the npm Trusted Publisher settings
    environment: npm-publish
    steps:
      # RELEASE_TOKEN (PAT) is required to push version commits and tags
      # to main, which is protected and requires PRs for normal pushes.
      # The PAT owner must be added to bypass_pull_request_allowances.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          # registry-url is required for OIDC trusted publishing.
          # npm CLI detects OIDC BEFORE falling back to NODE_AUTH_TOKEN.
          # Per https://docs.npmjs.com/trusted-publishers
          registry-url: 'https://registry.npmjs.org'
          # Docs explicitly recommend disabling cache for release builds.
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print Environment Info
        run: pnpm exec nx report

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version & Changelog (no tags, no push yet)
        # Bump versions and generate changelogs but explicitly skip tagging
        # and pushing. Tags are only created AFTER a successful npm publish
        # to prevent orphaned tags pointing to unpublished versions.
        id: version
        run: |
          pnpm exec nx release version --git-tag=false --git-push=false 2>&1 | tee /tmp/nx-version.log
          pnpm exec nx release changelog --git-tag=false --git-push=false 2>&1 | tee /tmp/nx-changelog.log

          # Check if nx release created new version commits
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "package.json\|CHANGELOG"; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: '0'

      - name: Push version commits (no tags yet)
        # Push the version bump + changelog commits to main.
        # --no-follow-tags ensures only commits are pushed, not any local tags.
        # Tags are pushed in a separate step only after publish succeeds.
        if: steps.version.outputs.changes == 'true'
        run: |
          git pull origin main --ff-only
          git push origin main --no-follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Build packages
        # Always build to ensure dist/ matches current source versions.
        # nx.json preVersionCommand only runs when nx release bumps versions.
        run: pnpm exec nx run-many -t build --exclude demo-app,acontplus-erp --parallel=3
        env:
          HUSKY: '0'

      - name: Publish to npm (OIDC trusted publishing)
        # setup-node writes NPM_CONFIG_USERCONFIG pointing to a temp .npmrc
        # with: //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
        # npm reads this file and the _authToken entry blocks OIDC detection
        # even after unsetting the env var. We overwrite the file with just
        # the registry line so npm 11 uses OIDC-first authentication.
        # Per https://docs.npmjs.com/trusted-publishers
        id: publish
        run: |
          # Clear _authToken from temp .npmrc so OIDC detection works
          echo "registry=https://registry.npmjs.org/" > "$NPM_CONFIG_USERCONFIG"

          published=0
          skipped=0
          failed=0

          for dir in dist/packages/*/; do
            if [ -f "$dir/package.json" ]; then
              pkg_name=$(node -p "require('./$dir/package.json').name")
              pkg_version=$(node -p "require('./$dir/package.json').version")
              echo "::group::Publishing $pkg_name@$pkg_version"

              if npm publish "$dir" --access public; then
                echo "✓ Published $pkg_name@$pkg_version"
                published=$((published + 1))
              else
                if npm view "$pkg_name@$pkg_version" version 2>/dev/null | grep -q "$pkg_version"; then
                  echo "⊘ Skipped $pkg_name@$pkg_version (already published)"
                  skipped=$((skipped + 1))
                else
                  echo "✗ Failed to publish $pkg_name@$pkg_version"
                  failed=$((failed + 1))
                fi
              fi
              echo "::endgroup::"
            fi
          done

          echo ""
          echo "Summary: $published published, $skipped skipped, $failed failed"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi

      - name: Tag & push (only after successful publish)
        # Create git tags and push them ONLY after npm publish succeeds.
        # This ensures every git tag corresponds to a version actually on npm.
        # Uses nx release changelog to create the tags properly (it reads the
        # version from the already-committed package.json files).
        if: steps.version.outputs.changes == 'true'
        run: |
          pnpm exec nx release changelog --git-commit=false --git-push=false
          git push origin main --tags
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: '0'
