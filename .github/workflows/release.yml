name: Release & Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # Required to push version commits, tags, and create GitHub releases
  contents: write
  # Required for OIDC trusted publishing and npm provenance attestation
  id-token: write

jobs:
  release:
    # Only run on merged PRs (not direct pushes)
    if: github.event.head_commit.message != ''
    runs-on: ubuntu-latest
    # Must match the Environment name configured in the npm Trusted Publisher settings
    environment: npm-publish
    steps:
      # RELEASE_TOKEN (PAT) is required to push version commits and tags
      # to main, which is protected and requires PRs for normal pushes.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v6

      # Per https://docs.npmjs.com/trusted-publishers:
      # - registry-url is required for OIDC endpoint configuration
      # - package-manager-cache: false is explicitly recommended for release builds
      # - id-token: write permission enables OIDC token generation
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print Environment Info
        run: pnpm exec nx report

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version, Changelog & Tag
        # Per https://nx.dev/docs/guides/nx-release/publish-in-ci-cd:
        # Run nx release --skip-publish locally (here in CI on main push).
        # This handles: version bump → changelog → git commit → git tag → git push.
        # Tags are created atomically with the version commit in this step.
        id: version
        run: |
          pnpm exec nx release --skip-publish 2>&1 | tee /tmp/nx-release.log
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "package.json\|CHANGELOG"; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: '0'

      - name: Push version commits and tags
        if: steps.version.outputs.changes == 'true'
        run: |
          git pull origin main --ff-only
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Build packages
        # nx release preVersionCommand builds during versioning when versions change.
        # This step ensures dist/ is always up to date even when nx release skips.
        run: pnpm exec nx run-many -t build --exclude demo-app,acontplus-erp --parallel=3
        env:
          HUSKY: '0'

      - name: Publish to npm (OIDC trusted publishing)
        # Per https://nx.dev/docs/guides/nx-release/publish-in-ci-cd:
        # Use nx release publish which natively checks npm view before publishing,
        # automatically skipping already-published versions without erroring.
        #
        # Per https://docs.npmjs.com/trusted-publishers:
        # npm 11 detects OIDC before falling back to NODE_AUTH_TOKEN.
        # setup-node writes _authToken to NPM_CONFIG_USERCONFIG — we clear it
        # so OIDC takes over. NPM_CONFIG_PROVENANCE=true generates attestations.
        run: |
          echo "registry=https://registry.npmjs.org/" > "$NPM_CONFIG_USERCONFIG"
          pnpm exec nx release publish
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          HUSKY: '0'
