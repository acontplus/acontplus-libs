name: Release & Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # Only run on merged PRs (not direct pushes)
    if: github.event.head_commit.message != ''
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      # RELEASE_TOKEN (PAT) is required to push version commits and tags
      # to main, which is protected and requires PRs for normal pushes.
      # The PAT owner must be added to bypass_pull_request_allowances.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Print Environment Info
        run: pnpm exec nx report

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version, Changelog & Tag
        run: pnpm exec nx release --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: '0'

      # Trusted publishing: uses OIDC (id-token: write) instead of NPM_TOKEN
      # Provenance attestations are generated automatically via OIDC
      - name: Publish to npm
        run: pnpm exec nx release publish
