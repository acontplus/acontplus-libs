@if (variant() === 'icon') {
<button
  matIconButton
  [disabled]="isDisabled()"
  [disableRipple]="disableRipple()"
  [acpLoading]="loading()"
  [type]="type()"
  [ngClass]="[colorClass(), squareClass(), sizeClass()]"
  (click)="clicked.emit()"
  (focus)="focused.emit()"
  (blur)="blurred.emit()"
>
  <mat-icon>{{icon()}}</mat-icon>
</button>
} @else if (variant() === 'fab') {
<button
  matFab
  [extended]="extended()"
  [disabled]="isDisabled()"
  [disableRipple]="disableRipple()"
  [acpLoading]="loading()"
  [type]="type()"
  [ngClass]="[colorClass(), sizeClass()]"
  (click)="clicked.emit()"
  (focus)="focused.emit()"
  (blur)="blurred.emit()"
>
  @if (icon()) { <mat-icon>{{icon()}}</mat-icon> } @if (extended()) { @if (hasText()) { {{text()}} }
  @else { <ng-content></ng-content> } }
</button>
} @else if (variant() === 'mini-fab') {
<button
  matMiniFab
  [disabled]="isDisabled()"
  [disableRipple]="disableRipple()"
  [acpLoading]="loading()"
  [type]="type()"
  [ngClass]="[colorClass(), sizeClass()]"
  (click)="clicked.emit()"
  (focus)="focused.emit()"
  (blur)="blurred.emit()"
>
  <mat-icon>{{icon()}}</mat-icon>
</button>
} @else {
<button
  [matButton]="appearance()"
  [disabled]="isDisabled()"
  [disableRipple]="disableRipple()"
  [acpLoading]="loading()"
  [type]="type()"
  [ngClass]="[colorClass(), squareClass(), sizeClass()]"
  (click)="clicked.emit()"
  (focus)="focused.emit()"
  (blur)="blurred.emit()"
>
  @if (icon()) { <mat-icon>{{icon()}}</mat-icon> } @if (hasText()) { {{text()}} } @else {
  <ng-content></ng-content> } @if (suffixIcon()) {
  <mat-icon iconPositionEnd>{{suffixIcon()}}</mat-icon> }
</button>
}
