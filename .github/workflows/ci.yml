name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      # Wiki and standalone docs — never affect lint or build
      - 'docs/**'
      - '.github/workflows/publish-wiki.yml'
      # Root-level and app markdown — no package impact
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'apps/**/*.md'
      # NOTE: packages/*/README.md is intentionally NOT ignored —
      # a fix(scope): commit updating a package README should trigger
      # CI + release to republish the package with the updated npm README.
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/publish-wiki.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'apps/**/*.md'

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v5

      - name: Run lint
        run: pnpm exec nx affected -t lint --exclude demo-app --parallel=3

      - name: Run build
        run: pnpm exec nx affected -t build --exclude demo-app --parallel=3
