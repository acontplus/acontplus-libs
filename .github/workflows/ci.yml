name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      # Wiki and standalone docs — never affect lint or build
      - 'docs/**'
      - '.github/workflows/publish-wiki.yml'
      # Root-level and app markdown — no package impact
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'apps/**/*.md'
      # NOTE: packages/*/README.md is intentionally NOT ignored —
      # a fix(scope): commit updating a package README should trigger
      # CI + release to republish the package with the updated npm README.
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/publish-wiki.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'apps/**/*.md'

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9f68d2
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: pnpm/action-setup@fe02b34c77c8cc9d786d3c8acc6211e3f402516b

      - uses: actions/setup-node@1f8c5b68e2f1eacc1d0f4ff6e6fdf31bb5c4f2d2
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@9a09540d0b1a9b6fc2a7b0ae9b7c5870666f7e4a

      - name: Run lint
        run: pnpm exec nx affected -t lint --exclude demo-app --parallel=3

      - name: Run build
        run: pnpm exec nx affected -t build --exclude demo-app --parallel=3
